<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Palm — shifted up slightly when gripping -->
  <rect x="7" y="20" width="24" height="14" rx="4" ry="4" fill="white" stroke="#222" stroke-width="2.2"/>
  <!-- Index finger — curled down -->
  <rect x="10" y="12" width="5" height="10" rx="2.5" ry="2.5" fill="white" stroke="#222" stroke-width="2.2"/>
  <!-- Middle finger — curled down -->
  <rect x="16.5" y="10" width="5" height="12" rx="2.5" ry="2.5" fill="white" stroke="#222" stroke-width="2.2"/>
  <!-- Ring finger — curled down -->
  <rect x="23" y="12" width="5" height="10" rx="2.5" ry="2.5" fill="white" stroke="#222" stroke-width="2.2"/>
  <!-- Pinky — curled -->
  <rect x="29" y="14" width="4" height="8" rx="2" ry="2" fill="white" stroke="#222" stroke-width="2.2"/>
  <!-- Thumb -->
  <rect x="3" y="21" width="6" height="9" rx="3" ry="3" fill="white" stroke="#222" stroke-width="2.2"/>
  <!-- Knuckle lines -->
  <line x1="12.5" y1="21" x2="12.5" y2="23" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="21" x2="19" y2="23" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25.5" y1="21" x2="25.5" y2="23" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Shadow -->
  <ellipse cx="19" cy="36" rx="10" ry="2" fill="rgba(0,0,0,0.11)"/>
</svg>
